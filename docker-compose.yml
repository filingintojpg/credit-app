version: '3.8'

services:
  database:
    image: postgres:18
    container_name: postgres-container
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  application-service:
    build:
      context: ./application-service
      dockerfile: Dockerfile
    container_name: application-service
    ports:
      - "${APPLICATION_SERVICE_PORT}:8080"
    environment:
      APPLICATION_SERVICE_PORT: ${APPLICATION_SERVICE_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CAMUNDA_URL: ${CAMUNDA_URL}
      CAMUNDA_USERNAME: ${CAMUNDA_USERNAME}
      CAMUNDA_PASSWORD: ${CAMUNDA_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
      decision-service:
        condition: service_started

  decision-service:
    build:
      context: ./decision-service
      dockerfile: Dockerfile
    container_name: decision-service
    ports:
      - "${DECISION_SERVICE_PORT}:8090"
    environment:
      DECISION_SERVICE_PORT: ${DECISION_SERVICE_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CAMUNDA_USERNAME: ${CAMUNDA_USERNAME}
      CAMUNDA_PASSWORD: ${CAMUNDA_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
