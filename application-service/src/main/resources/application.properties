spring.application.name=application-service

# Server
server.port=${APPLICATION_SERVICE_PORT}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Turning off JPA-config to use Hibernate directly
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Camunda connection
camunda.url=${CAMUNDA_URL}
camunda.username=${CAMUNDA_USERNAME}
camunda.password=${CAMUNDA_PASSWORD}
